        const parseCSV = (str) => {
            const arr = []; let quote = false; let row = 0, col = 0, c = 0;
            for (; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if ((cc === '\r' && nc === '\n') && !quote) { ++row; col = 0; ++c; continue; }
                if ((cc === '\n' || cc === '\r') && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        };

        const getMonthYear = (dateStr) => {
            if (!dateStr) return 'Inconnu';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return 'Inconnu';
            return d.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
        };

        const getISOWeek = (d) => {
            if (!(d instanceof Date) || isNaN(d.getTime())) return 0;
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        };

        const getDaysForWeek = (weekStr) => {
            if (!weekStr) return Array(5).fill({name: '-', date: '-'});
            const currentYear = new Date().getFullYear();
            const weekMatch = String(weekStr).match(/\d+/);
            if (!weekMatch) return Array(5).fill({name: '-', date: '-'});
            const weekNum = parseInt(weekMatch[0], 10);
            
            const simple = new Date(currentYear, 0, 1 + (weekNum - 1) * 7);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            
            const days = [];
            const dayNames = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
            for(let i=0; i<5; i++) {
                const d = new Date(ISOweekStart);
                d.setDate(d.getDate() + i);
                days.push({ name: dayNames[i], date: d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) });
            }
            return days;
        };
        
        const getWeekDateRange = (weekStr) => {
            if (!weekStr) return null;
            const weekMatch = String(weekStr).match(/\d+/);
            if (!weekMatch) return null;
            const weekNum = parseInt(weekMatch[0], 10);
            const currentYear = new Date().getFullYear();
            
            const simple = new Date(currentYear, 0, 1 + (weekNum - 1) * 7);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            
            const monday = new Date(ISOweekStart);
            const sunday = new Date(ISOweekStart);
            sunday.setDate(sunday.getDate() + 6);
            
            const format = d => {
                const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            };
            return { min: format(monday), max: format(sunday) };
        };
        
        const calculerNiveaux = (formSite) => {
            const sorted = [...formSite].sort((a, b) => {
                const da = new Date(a?.startDate || 0).getTime();
                const db = new Date(b?.startDate || 0).getTime();
                return (isNaN(da) ? 0 : da) - (isNaN(db) ? 0 : db);
            });
            const levels = [];
            return sorted.map(t => {
                const start = new Date(t?.startDate || 0);
                if (isNaN(start.getTime())) return { ...t, level: 0 };
                const end = new Date(start); 
                end.setDate(start.getDate() + (parseFloat(t?.duration) || 0));
                let level = 0; 
                while (levels[level] && levels[level] > start) { level++; }
                levels[level] = end; 
                return { ...t, level };
            });
        };

            if (t.type === 'Projet Genesys') {

                if (Math.abs(val - 1) < 0.01) return '1 journée';
                if (Math.abs(val - 1.5) < 0.01) return '1.5 jrs';

        // --- WRAPPER D'AUTHENTIFICATION PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Gestion du lien partagé public
                const checkAnonymous = async () => {
                    if (isSharedLink) {
                        try {
                            await signInAnonymously(auth);
                        } catch (e) {
                            console.error("Erreur de connexion anonyme:", e);
                        }
                    }
                };
                checkAnonymous();

                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        if (currentUser.isAnonymous) {
                            setUserRole('Lecture seule'); // Forcé pour le lien public
                            setLoading(false);
                        } else {
                            try {
                                const roleDocRef = doc(db, 'artifacts', artifactAppId, 'public', 'data', 'userRoles', currentUser.uid);
                                const roleDoc = await getDoc(roleDocRef);
                                if (roleDoc.exists()) {
                                    setUserRole(roleDoc.data().role);
                                } else {
                                    setUserRole('Lecture seule'); // Par défaut
                                }
                            } catch (error) {
                                console.error("Erreur rôle:", error);
                                setUserRole('Lecture seule');
                            }
                            setLoading(false);
                        }
                    } else {
                        setUser(null);
                        setUserRole(null);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="flex flex-col items-center gap-4">
                            <div className="animate-spin rounded-full h-12 w-12 border-4 border-slate-300 border-t-blue-600"></div>
                            <p className="text-slate-500 font-bold tracking-widest uppercase text-xs">Vérification de sécurité...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <EcranAuthentification />;
            }

            return <OutilPilotage user={user} userRole={userRole} setUserRole={setUserRole} />;
        }

        // --- ÉCRAN DE CONNEXION ---
        function EcranAuthentification() {
            const [estInscription, setEstInscription] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [erreur, setErreur] = useState('');
            const [chargement, setChargement] = useState(false);
            const [succes, setSucces] = useState('');

            const gererSoumission = async (e) => {
                e.preventDefault();
                setErreur('');
                setSucces('');
                setChargement(true);

                try {
                    if (estInscription) {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        await setDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', 'userRoles', userCredential.user.uid), {
                            email: email, role: 'Lecture seule', dateCreation: Date.now()
                        });
                        setSucces('Compte créé avec succès !');
                        setTimeout(() => setEstInscription(false), 2000);
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                } catch (error) {
                    switch (error.code) {
                        case 'auth/invalid-email': setErreur('Adresse email invalide.'); break;
                        case 'auth/user-not-found': setErreur('Aucun compte trouvé.'); break;
                        case 'auth/wrong-password': setErreur('Mot de passe incorrect.'); break;
                        case 'auth/email-already-in-use': setErreur('Cet email est déjà utilisé.'); break;
                        case 'auth/weak-password': setErreur('Le mot de passe doit faire au moins 6 caractères.'); break;
                        default: setErreur('Erreur : ' + error.message);
                    }
                } finally {
                    setChargement(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-200">
                        <div className="bg-[#0f172a] p-10 text-center relative overflow-hidden">
                            <div className="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-screen filter blur-[40px] opacity-40"></div>
                            <div className="absolute -bottom-10 -left-10 w-32 h-32 bg-emerald-500 rounded-full mix-blend-screen filter blur-[40px] opacity-40"></div>
                            
                            <div className="relative z-10">
                                <Icone nom="bouclier-ok" taille={48} classe="text-blue-500 mx-auto mb-4" />
                                <h2 className="text-2xl font-black text-white uppercase tracking-widest">
                                    {estInscription ? 'Créer un accès' : 'Espace Sécurisé'}
                                </h2>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Pilotage Formation</p>
                            </div>
                        </div>
                        <div className="p-8">
                            {erreur && <div className="mb-6 p-4 bg-rose-50 border-l-4 border-rose-500 text-rose-700 text-xs font-bold rounded-r-lg flex items-center gap-2"><Icone nom="alerte-triangle" taille={16}/>{erreur}</div>}
                            {succes && <div className="mb-6 p-4 bg-emerald-50 border-l-4 border-emerald-500 text-emerald-700 text-xs font-bold rounded-r-lg flex items-center gap-2"><Icone nom="cercle-ok" taille={16}/>{succes}</div>}

                            <form onSubmit={gererSoumission} className="space-y-5">
                                <div>
                                    <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Email professionnel</label>
                                    <div className="relative">
                                        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icone nom="mail" taille={18} /></div>
                                        <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-sm focus:ring-2 focus:ring-blue-500 transition-all" placeholder="prenom.nom@concentrix.com" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-black uppercase text-slate-400 mb-1">Mot de passe</label>
                                    <div className="relative">
                                        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icone nom="lock" taille={18} /></div>
                                        <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-sm focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••" />
                                    </div>
                                </div>
                                <button type="submit" disabled={chargement} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-4 rounded-xl flex justify-center items-center gap-2 uppercase tracking-widest text-xs mt-6 transition-all shadow-xl shadow-blue-600/20 active:scale-95 disabled:opacity-50">
                                    {chargement ? <Icone nom="chargement" classe="animate-spin" taille={18} /> : estInscription ? <><Icone nom="user-plus" taille={18} /> Demander un accès</> : <><Icone nom="log-in" taille={18} /> Connexion</>}
                                </button>
                            </form>
                            <div className="mt-8 text-center">
                                <button onClick={() => { setEstInscription(!estInscription); setErreur(''); setSucces(''); }} className="text-xs font-bold text-slate-500 hover:text-blue-600 transition-colors underline underline-offset-4">
                                    {estInscription ? "J'ai déjà un compte, me connecter" : "Je n'ai pas de compte, faire une demande"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- VOTRE OUTIL PRINCIPAL (Protégé par les rôles) ---
        function OutilPilotage({ user, userRole, setUserRole }) {
            // VERIFICATION DES DROITS (RBAC)
            const peutEditer = userRole === 'Admin' || userRole === 'Manager';

            // --- DEBUT DU CODE ORIGINAL DE VOTRE APP ---
            const [environnement, setEnvironnement] = useState('B2C');
            const environnementRef = useRef(environnement);
            useEffect(() => { environnementRef.current = environnement; }, [environnement]);

            const getDbInfo = () => ({
                colName: environnement === 'B2C' ? 'formations' : 'formations_b2b',
                localKey: environnement === 'B2C' ? 'pilotage_b2c_data' : 'pilotage_b2b_data'
            });

            const [chargement, setChargement] = useState(true);
            const [formations, setFormations] = useState([]);
            const [vue, setVue] = useState('accueil');
            
            const timelineRef = useRef(null); 
            
            const baseFiltres = { sites: [], budgets: [], statuts: [], semaines: [], mois: [], types: [], noms: [] };
            const [filtresParVue, setFiltresParVue] = useState({
                accueil: { ...baseFiltres }, suivi: { ...baseFiltres }, selection: { ...baseFiltres },
                psf: { ...baseFiltres }, spe: { ...baseFiltres }, fim: { ...baseFiltres },
                genesys: { ...baseFiltres }, ttt: { ...baseFiltres }, chronologie: { ...baseFiltres }, planning: { ...baseFiltres }
            });
            const filtres = filtresParVue[vue] || baseFiltres;
            const setFiltres = (nouveauxFiltres) => setFiltresParVue(prev => ({ ...prev, [vue]: nouveauxFiltres }));
            
            const [modalAjout, setModalAjout] = useState(false);
            const [modalAjoutPSF, setModalAjoutPSF] = useState(false);
            const [modalTTT, setModalTTT] = useState(false);
            const [modalMultiple, setModalMultiple] = useState(false);
            const [modalMultiplePSF, setModalMultiplePSF] = useState(false);
            const [modalMultipleTTT, setModalMultipleTTT] = useState(false);
            const [editionEnCours, setEditionEnCours] = useState(false);
            const [lastAutoSave, setLastAutoSave] = useState(null);
            
            const [afficherImportExcel, setAfficherImportExcel] = useState(false);
            const [texteImport, setTexteImport] = useState('');
            
            const defaultFormation = {
                name: '', type: 'Formation continue', week: 'S12', site: 'Rabat', trainer: 'Rachid', funding: 'Concentrix', 
                agents: 12, agentsRealises: 0, duration: 1, startDate: new Date().toISOString().split('T')[0], 
                status: 'Planifié', comment: '', isValidated: false, isTTT: false, cible: []
            };
            const defaultFormationPSF = { ...defaultFormation, type: 'PSF', duration: 60/JOUR_EN_MINUTES, dates: [], cible: [], deadline: '' };

            const [nouvelleFormation, setNouvelleFormation] = useState(defaultFormation);
            const [nouvelleFormationPSF, setNouvelleFormationPSF] = useState(defaultFormationPSF);
            const [dateTemp, setDateTemp] = useState('');

            const [lignesMultiples, setLignesMultiples] = useState([]);
            const [lignesMultiplesPSF, setLignesMultiplesPSF] = useState([]);
            const [lignesMultiplesTTT, setLignesMultiplesTTT] = useState([]);
            
            // --- Récupération des données depuis Firestore ---
            useEffect(() => {
                setChargement(true);
                const { colName, localKey } = getDbInfo();

                const unsubscribe = onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', colName), (snap) => {
                    const fbData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setFormations(fbData);
                    setChargement(false);
                }, (error) => {
                    console.error("Erreur Firestore :", error);
                    // Fallback Local Storage
                    const localData = localStorage.getItem(localKey);
                    if (localData) { try { setFormations(JSON.parse(localData)); } catch(e){} }
                    setChargement(false);
                });

                return () => unsubscribe();
            }, [environnement]);

            const formationsRef = useRef(formations);
            useEffect(() => { formationsRef.current = formations; }, [formations]);

            useEffect(() => {
                const autoSaveFn = () => {
                    if (formationsRef.current && formationsRef.current.length > 0) {
                        exportDB(formationsRef.current, true);
                        setLastAutoSave(new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }));
                    }
                };
                const intervalId = setInterval(autoSaveFn, 86400000);
                const handleBeforeUnload = () => { autoSaveFn(); };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => { clearInterval(intervalId); window.removeEventListener('beforeunload', handleBeforeUnload); };
            }, []);

            const centerTimelineOnToday = () => {
                const timelineContainer = timelineRef.current;
                if (timelineContainer) {
                    const todayMarker = timelineContainer.querySelector('.marker-today');
                    if (todayMarker) {
                        todayMarker.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                }
            };

            useEffect(() => {
                if (vue === 'chronologie') {
                    const timer = setTimeout(() => centerTimelineOnToday(), 500);
                    return () => clearTimeout(timer);
                }
            }, [vue, formations]);

            const currentWeekNum = useMemo(() => getISOWeek(new Date()), []);
            const allStatuts = useMemo(() => [...new Set(formations.map(f => f?.status).filter(Boolean))], [formations]);
            const allMonths = useMemo(() => [...new Set(formations.map(f => getMonthYear(f?.startDate)).filter(m => m !== 'Inconnu'))], [formations]);
            const moisDeLAnnee = useMemo(() => {
                const currentYear = new Date().getFullYear();
                const months = [];
                for (let i=0; i<12; i++) months.push(new Date(currentYear, i, 1).toLocaleString('fr-FR', { month: 'long', year: 'numeric' }));
                formations.forEach(f => { const m = getMonthYear(f?.startDate); if (m !== 'Inconnu' && !months.includes(m)) months.push(m); });
                return months;
            }, [formations]);
            
            const allWeeks = useMemo(() => {
                const weeksSet = new Set();
                formations.forEach(f => { if(f?.week) { if(f.week.includes(',')) f.week.split(',').forEach(w => weeksSet.add(w.trim())); else weeksSet.add(f.week); } });
                return [...weeksSet].sort((a, b) => String(a || '').localeCompare(String(b || ''), undefined, { numeric: true }));
            }, [formations]);
            
            const allNomsGenesys = useMemo(() => [...new Set(formations.filter(f => f?.type === 'Projet Genesys').map(f => f?.name).filter(Boolean))], [formations]);
            const semainesDynamiques = useMemo(() => {
                const ensemble = new Set();
                formations.forEach(t => { if(t?.week) { if(t.week.includes(',')) t.week.split(',').forEach(w => ensemble.add(w.trim())); else ensemble.add(t.week); } });
                if (ensemble.size === 0) ensemble.add('S' + getISOWeek(new Date()));
                return Array.from(ensemble).sort((a, b) => String(a || '').localeCompare(String(b || ''), undefined, { numeric: true }));
            }, [formations]);

            const targetWeekDisplay = useMemo(() => 'S' + (currentWeekNum + 2), [currentWeekNum]);
            const formationsSelectionAgent = useMemo(() => formations.filter(f => f?.status === 'À planifier' && f?.week === targetWeekDisplay && f?.type === 'Spécialisation'), [formations, targetWeekDisplay]);

            const chronologieDonnees = useMemo(() => {
                const filtrees = formations.filter(t => t?.type !== 'PSF');
                const now = new Date(); now.setHours(0,0,0,0);
                let start = new Date(now); start.setDate(now.getDate() - 7); 
                let end = new Date(start); end.setDate(end.getDate() + 90); 
                const dates = filtrees.map(t => new Date(t?.startDate || 0)).filter(d => !isNaN(d.getTime())).sort((a, b) => a - b);
                if (dates.length > 0) {
                    if (dates[0] < start) { start = new Date(dates[0]); start.setDate(start.getDate() - 7); }
                    const lastDate = new Date(dates[dates.length - 1]); lastDate.setDate(lastDate.getDate() + 30); 
                    if (lastDate > end) end = lastDate;
                }
                let totalSpan = Math.ceil((end - start) / (1000 * 3600 * 24));
                totalSpan = Math.max(90, Math.min(totalSpan, 365)); 
                const days = Array.from({ length: totalSpan }, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
                return { start, days, totalSpan };
            }, [formations]);

            const passeFiltres = (t) => {
                if (!t) return false;
                if (filtres.sites && filtres.sites.length > 0 && !filtres.sites.includes(t.site)) return false;
                if (filtres.budgets && filtres.budgets.length > 0 && !filtres.budgets.includes(t.funding)) return false;
                if (filtres.statuts && filtres.statuts.length > 0 && !filtres.statuts.includes(t.status)) return false;
                if (filtres.types && filtres.types.length > 0 && !filtres.types.includes(t.type)) return false;
                if (filtres.noms && filtres.noms.length > 0 && !filtres.noms.includes(t.name)) return false;
                if (filtres.semaines && filtres.semaines.length > 0) {
                    if (!t.week) return false;
                    if (!filtres.semaines.some(sw => t.week.includes(sw))) return false;
                }
                if (filtres.mois && filtres.mois.length > 0 && !filtres.mois.includes(getMonthYear(t.startDate))) return false;
                return true;
            };

            const formationsFiltrees = useMemo(() => formations.filter(t => !t?.isTTT && passeFiltres(t)).sort((a, b) => String(a?.week || '').localeCompare(String(b?.week || ''), undefined, { numeric: true })), [formations, filtres]);
            const formationsPSF = useMemo(() => formations.filter(t => t?.type === 'PSF' && !t?.isTTT && passeFiltres(t)).sort((a, b) => String(a?.week || '').localeCompare(String(b?.week || ''), undefined, { numeric: true })), [formations, filtres]);
            const formationsSpe = useMemo(() => formations.filter(t => t?.type === 'Spécialisation' && !t?.isTTT && passeFiltres(t)).sort((a, b) => String(a?.week || '').localeCompare(String(b?.week || ''), undefined, { numeric: true })), [formations, filtres]);
            const formationsFim = useMemo(() => formations.filter(t => t?.type === 'FIM' && !t?.isTTT && passeFiltres(t)).sort((a, b) => String(a?.week || '').localeCompare(String(b?.week || ''), undefined, { numeric: true })), [formations, filtres]);
            const formationsGenesys = useMemo(() => formations.filter(t => t?.type === 'Projet Genesys' && !t?.isTTT && passeFiltres(t)).sort((a, b) => String(a?.week || '').localeCompare(String(b?.week || ''), undefined, { numeric: true })), [formations, filtres]);
            const formationsTTT = useMemo(() => formations.filter(t => t?.isTTT && passeFiltres(t)).sort((a, b) => String(a?.week || '').localeCompare(String(b?.week || ''), undefined, { numeric: true })), [formations, filtres]);

            // EXCLUSION DES ANNULATIONS DES CALCULS DE BILAN ET RÉPARTITION
            const bilanMensuelData = useMemo(() => formations.filter(t => t && !t.isTTT && t.status !== 'Annulé' && passeFiltres(t) && (!filtres.mois || filtres.mois.length === 0 || filtres.mois.includes(getMonthYear(t.startDate)))), [formations, filtres]);
            const bilanHebdoData = useMemo(() => formations.filter(t => t && !t.isTTT && t.status !== 'Annulé' && passeFiltres(t) && (!filtres.semaines || filtres.semaines.length === 0 || (t.week && filtres.semaines.some(sw => t.week.includes(sw))))), [formations, filtres]);

            const suiviDonnees = useMemo(() => {
                const base = formations.filter(t => !t?.isTTT && t?.status !== 'Annulé' && passeFiltres(t));
                const typesSet = new Set();
                let grandTotal = 0; let totalAgents = 0; const colTotals = {};
                base.forEach(t => {
                    if(!t) return;
                    const type = t.type || 'Autre';
                    const hours = (parseFloat(t.duration) || 0) * 7 * (parseInt(t.agents) || 0);
                    if (!colTotals[type]) colTotals[type] = 0;
                    colTotals[type] += hours; typesSet.add(type); grandTotal += hours; totalAgents += parseInt(t.agents) || 0;
                });
                return { types: Array.from(typesSet).sort(), colTotals, grandTotal, totalAgents };
            }, [formations, filtres]);

            const heuresParSite = useMemo(() => {
                let rabat = 0, meknes = 0;
                formations.filter(t => !t?.isTTT && t?.status !== 'Annulé' && passeFiltres(t)).forEach(t => {
                    if(!t) return;
                    const h = (parseFloat(t.duration) || 0) * 7 * (parseInt(t.agents) || 0);
                    if (t.site === 'Rabat') rabat += h;
                    if (t.site === 'Meknès') meknes += h;
                    if (t.site === 'Rabat & Meknès') { rabat += h/2; meknes += h/2; } 
                });
                return { rabat, meknes };
            }, [formations, filtres]);

            const ensembleStats = useMemo(() => {
                // On exclut les annulations de l'affichage global de l'Accueil aussi
                const base = formationsFiltrees.filter(f => f?.status !== 'Annulé');
                const total = base.length;
                const terminees = base.filter(f => f?.status === 'Terminé').length;
                const enCours = base.filter(f => f?.status === 'En cours').length;
                const planifiees = base.filter(f => ['Planifié', 'À planifier', 'Sélection des agents en cours', 'En attente de validation'].includes(f?.status)).length;
                const taux = total > 0 ? Math.round((terminees / total) * 100) : 0;
                return { total, terminees, enCours, planifiees, taux };
            }, [formationsFiltrees]);

            const carteConflits = useMemo(() => {
                const map = {};
                formations.filter(t => t?.type !== 'PSF').forEach(t => {
                    if(!t || !t.week) return;
                    if (t.isTTT && t.cible && t.cible.length > 0) {
                        t.cible.forEach(c => {
                            if(c === 'Tous les formateurs') return;
                            const cle = `${c}-${t.week}`;
                            if (!map[cle]) map[cle] = []; map[cle].push(t.id);
                        });
                    } else if (t.trainer) {
                        const cle = `${t.trainer}-${t.week}`;
                        if (!map[cle]) map[cle] = []; map[cle].push(t.id);
                    }
                });
                return map;
            }, [formations]);

            const conflitActuel = useMemo(() => {
                const formToCheck = modalAjoutPSF ? nouvelleFormationPSF : nouvelleFormation;
                if (!formToCheck.week || formToCheck.type === 'PSF') return false;
                
                if (formToCheck.isTTT && formToCheck.cible) {
                    return formToCheck.cible.some(c => {
                        if (c === 'Tous les formateurs') return false;
                        const existants = formations.filter(t => t?.type !== 'PSF' && t?.id !== formToCheck.id && t?.week === formToCheck.week && (t.trainer === c || (t.isTTT && t.cible && t.cible.includes(c))));
                        return existants.length > 0;
                    });
                } else if (formToCheck.trainer) {
                    const existants = formations.filter(t => t?.type !== 'PSF' && t?.id !== formToCheck.id && t?.week === formToCheck.week && (t.trainer === formToCheck.trainer || (t.isTTT && t.cible && t.cible.includes(formToCheck.trainer))));
                    return existants.length > 0;
                }
                return false;
            }, [nouvelleFormation, nouvelleFormationPSF, modalAjoutPSF, formations]);

            const hasConflict = (t) => {
                if (!t) return false;
                if (t.isTTT && t.cible && t.cible.length > 0) {
                    return t.cible.some(c => carteConflits[`${c}-${t.week}`]?.length > 1);
                }
                return carteConflits[`${t.trainer}-${t.week}`]?.length > 1;
            };

            const isSMinus1 = (t) => {
                if (t?.status !== 'À planifier' || !t?.week) return false;
                const weekStr = String(t.week).replace(/[^0-9]/g, '');
                if (!weekStr) return false;
                const formationWeekNum = parseInt(weekStr, 10);
                if (isNaN(formationWeekNum)) return false;
                return (formationWeekNum === currentWeekNum + 1) || (currentWeekNum === 52 && formationWeekNum === 1);
            };

            const rappelsPSF = useMemo(() => formations.filter(t => t?.type === 'PSF' && isSMinus1(t)), [formations, currentWeekNum]);
            const rappelsSpe = useMemo(() => formations.filter(t => t?.type === 'Spécialisation' && isSMinus1(t)), [formations, currentWeekNum]);
            const rappelsFim = useMemo(() => formations.filter(t => t?.type === 'FIM' && isSMinus1(t)), [formations, currentWeekNum]);
            const rappelsGenesys = useMemo(() => formations.filter(t => t?.type === 'Projet Genesys' && isSMinus1(t)), [formations, currentWeekNum]);
            const stats = useMemo(() => ({ nbSelection: formationsSelectionAgent.length }), [formationsSelectionAgent]);

            const updatePSFDates = (newDates) => {
                const sortedDates = newDates.sort();
                const weeks = [...new Set(sortedDates.map(d => 'S' + getISOWeek(new Date(d))))].join(', ');
                setNouvelleFormationPSF(prev => ({ ...prev, dates: sortedDates, startDate: sortedDates[0] || '', week: weeks }));
            };

            // --- FONCTIONS FIREBASE ---
            const validerFormation = async () => {
                const isPSF = modalAjoutPSF;
                const formToSave = isPSF ? nouvelleFormationPSF : nouvelleFormation;
                if(!formToSave.name) return;
                if (conflitActuel && !formToSave.isValidated) { alert("Veuillez autoriser le chevauchement."); return; }
                const data = { ...formToSave, duration: parseFloat(formToSave.duration) || 0, agents: parseInt(formToSave.agents) || 0, agentsRealises: parseInt(formToSave.agentsRealises) || 0, updatedAt: new Date().toISOString() };
                const { colName } = getDbInfo();
                
                try {
                    if (editionEnCours) {
                        await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', colName, formToSave.id), data);
                    } else {
                        const payload = { ...data, id: Date.now().toString(), createdAt: new Date().toISOString() };
                        await setDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', colName, payload.id), payload);
                    }
                } catch (err) { console.error(err); }

                setModalAjout(false); setModalTTT(false); setModalAjoutPSF(false); setEditionEnCours(false);
                setNouvelleFormation(defaultFormation); setNouvelleFormationPSF(defaultFormationPSF); setDateTemp('');
            };

            const mettreAJourStatutDirect = async (id, nouveauStatut) => {
                const { colName } = getDbInfo();
                try {
                    await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', colName, id), { status: nouveauStatut, updatedAt: new Date().toISOString() });
                } catch (err) { console.error(err); }
            };

            const deleteTraining = async (id) => {
                if(!window.confirm('Voulez-vous vraiment supprimer cette session ?')) return;
                const { colName } = getDbInfo();
                try {
                    await deleteDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', colName, id));
                } catch (err) { console.error(err); }
            };

            const enregistrerMultiples = async (mode = 'standard') => {
                const lignes = mode === 'PSF' ? lignesMultiplesPSF : (mode === 'TTT' ? lignesMultiplesTTT : lignesMultiples);
                if (lignes.find(r => !r.name)) { alert("Nom manquant dans une des lignes."); return; }
                setChargement(true);
                const { colName } = getDbInfo();
                try {
                    const payload = lignes.map(r => ({ ...r, duration: parseFloat(r.duration) || 0, agents: parseInt(r.agents) || 0, agentsRealises: parseInt(r.agentsRealises) || 0, createdAt: new Date().toISOString() }));
                    for (const item of payload) {
                        await setDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', colName, item.id), item);
                    } 
                    setModalMultiple(false); setModalMultiplePSF(false); setModalMultipleTTT(false);
                    if(mode === 'PSF') setLignesMultiplesPSF([]);
                    else if(mode === 'TTT') setLignesMultiplesTTT([]);
                    else setLignesMultiples([]);

                                        <button onClick={() => setLignesMultiplesTTT([...lignesMultiplesTTT, { id: Date.now().toString() + lignesMultiplesTTT.length, name: '', type: 'FIM', startDate: new Date().toISOString().split('T')[0], week: 'S'+getISOWeek(new Date()), cible: ['Tous les formateurs'], comment: '', duration: 60/420, site: 'Rabat & Meknès', status: 'Planifié', isValidated: true, isTTT: true, trainer: 'Tous les formateurs' }])} className="mt-4 flex items-center gap-2 text-amber-600 font-black uppercase text-xs tracking-widest hover:text-amber-500 transition-colors px-4 py-2 border-2 border-amber-100 rounded-2xl hover:bg-amber-50 bg-white shadow-sm"><Icone nom="plus" taille={16} /> Ajouter une ligne manuellement</button>
                                    </div>
                                    <div className="p-6 bg-white border-t border-slate-200 flex justify-between items-center shrink-0">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">{lignesMultiplesTTT.length} session(s) TTT prêtes</p>
                                        <div className="flex gap-4"><button onClick={() => setModalMultipleTTT(false)} className="px-8 py-4 font-black uppercase text-xs text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-2xl transition-colors tracking-widest">Annuler</button><button onClick={() => enregistrerMultiples('TTT')} className="bg-amber-500 text-white px-12 py-4 rounded-[2rem] font-black text-xs shadow-xl shadow-amber-500/20 active:scale-95 transition-all uppercase tracking-widest hover:bg-amber-400 flex items-center gap-2"><Icone nom="bouclier-ok" taille={16}/> Enregistrer les TTT</button></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- DÉMARRAGE DE L'APPLICATION ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
